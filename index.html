<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS Icon Gallery</title>

<style>
:root {
  --bg: #0f0f10;
  --text: #ffffff;
  --card: rgba(255,255,255,0.06);
}

.light {
  --bg: #f5f5f7;
  --text: #111;
  --card: rgba(0,0,0,0.05);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  text-align: center;
  padding: 40px 20px;
}

h1 { font-size: 2.5rem; margin: 0; }
p { opacity: 0.7; }

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

button {
  border: none;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  background: var(--card);
  color: var(--text);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.grid {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 10px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-6px) scale(1.05);
}

img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
}

.download {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  background: black;
  color: white;
  padding: 4px 8px;
  border-radius: 8px;
  text-decoration: none;
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>
  <h1>🎨 MacOS Icon Gallery</h1>
  <p>Renaissance × Baroque</p>

  <div class="controls">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('baroque')">Baroque</button>
    <button onclick="filterImages('renaissance')">Renaissance</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
const images = [
  {src:"Folder BGs/ART.png", type:"baroque"},
  {src:"Folder BGs/Baroque 14.png", type:"baroque"},
  {src:"Folder BGs/Baroque_sierrabrown.png", type:"baroque"},
  {src:"Folder BGs/Baroque-Photoroom.png", type:"baroque"},
  {src:"Folder BGs/Baroque10.png", type:"baroque"},
  {src:"Folder BGs/Baroque11.png", type:"baroque"},
  {src:"Folder BGs/Baroque12.png", type:"baroque"},
  {src:"Folder BGs/Baroque13.png", type:"baroque"},
  {src:"Folder BGs/Baroque15.png", type:"baroque"},
  {src:"Folder BGs/Baroque2_ copy.png", type:"baroque"},
  {src:"Folder BGs/Baroque2_.png", type:"baroque"},
  {src:"Folder BGs/Baroque3.png", type:"baroque"},
  {src:"Folder BGs/Baroque4.png", type:"baroque"},
  {src:"Folder BGs/Baroque5.png", type:"baroque"},
  {src:"Folder BGs/Baroque6.png", type:"baroque"},
  {src:"Folder BGs/Baroque7.png", type:"baroque"},
  {src:"Folder BGs/Baroque8.png", type:"baroque"},

  {src:"Folder BGs/Renaissance_Orange.png", type:"renaissance"},
  {src:"Folder BGs/Renaissance_pink.png", type:"renaissance"},
  {src:"Folder BGs/Renaissance_Purple.png", type:"renaissance"},
  {src:"Folder BGs/Renaissance_Red.png", type:"renaissance"},
  {src:"Folder BGs/Renaissane_Yellow.png", type:"renaissance"},
];

const gallery = document.getElementById("gallery");

function render(filter="all"){
  gallery.innerHTML="";
  images.filter(img => filter==="all" || img.type===filter)
    .forEach(img => {
      const card = document.createElement("div");
      card.className="card";

      card.innerHTML = `
        <img src="${img.src}" onclick="openModal('${img.src}')">
        <a class="download" href="${img.src}" download>⬇</a>
      `;

      gallery.appendChild(card);
    });
}

function filterImages(type){
  render(type);
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
