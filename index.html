<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS Icon Gallery</title>

<style>
:root {
  --bg: #0f0f10;
  --text: #ffffff;
  --card: rgba(255,255,255,0.06);
}

.light {
  --bg: #f5f5f7;
  --text: #111;
  --card: rgba(0,0,0,0.05);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  background: var(--bg);
  transition: 0.3s;
  overflow-x: hidden;
}

/* 🌈 Animated Gradient Background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #533483);
  animation: gradientMove 18s infinite linear;
  z-index: -1;
}

@keyframes gradientMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

header {
  text-align: center;
  padding: 40px 20px;
}

h1 { font-size: 2.6rem; margin: 0; }
p { opacity: 0.7; }

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

button {
  border: none;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  background: var(--card);
  color: var(--text);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* 🧱 Masonry */
.grid {
  column-count: 4;
  column-gap: 16px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

@media (max-width: 900px) {
  .grid { column-count: 2; }
}

.card {
  break-inside: avoid;
  margin-bottom: 16px;
  background: var(--card);
  border-radius: 16px;
  padding: 8px;
  position: relative;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
}

/* Download button */
.download {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  background: black;
  color: white;
  padding: 4px 8px;
  border-radius: 8px;
  text-decoration: none;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(0,0,0,0.95);
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

footer {
  text-align: center;
  padding: 40px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>🎨 MacOS Icon Gallery</h1>
  <p>Renaissance × Baroque Folder Icons</p>

  <div class="controls">
    <button onclick="render('all')">All</button>
    <button onclick="render('warm')">🔥 Warm</button>
    <button onclick="render('cool')">❄️ Cool</button>
    <button onclick="toggleTheme()">🎭 Toggle Theme</button>
  </div>
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<footer>
  Crafted with classical aesthetics ✨
</footer>

<script>
const images = [
  "Folder BGs/background-removed-background-removed.png",
  "Folder BGs/Baroque 14.png",
  "Folder BGs/Baroque_sierrabrown.png",
  "Folder BGs/Baroque-Photoroom.png",
  "Folder BGs/Baroque10.png",
  "Folder BGs/Baroque11.png",
  "Folder BGs/Baroque12.png",
  "Folder BGs/Baroque13.png",
  "Folder BGs/Baroque15.png",
  "Folder BGs/Baroque2_ copy.png",
  "Folder BGs/Baroque2_.png",
  "Folder BGs/Baroque3.png",
  "Folder BGs/Baroque4.png",
  "Folder BGs/Baroque5.png",
  "Folder BGs/Baroque6.png",
  "Folder BGs/Baroque7.png",
  "Folder BGs/Baroque8.png",
  "Folder BGs/Renaissance_Orange.png",
  "Folder BGs/Renaissance_pink.png",
  "Folder BGs/Renaissance_Purple.png",
  "Folder BGs/Renaissance_Red.png",
  "Folder BGs/Renaissane_Yellow.png"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

function detectTone(name) {
  const warm = ["red","orange","brown","yellow"];
  return warm.some(w => name.toLowerCase().includes(w)) ? "warm" : "cool";
}

function render(filter="all"){
  gallery.innerHTML = "";

  images
    .filter(src => filter==="all" || detectTone(src)===filter)
    .forEach((src, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${src}" onclick="openModal(${index})">
        <a class="download" href="${src}" download>⬇</a>
      `;

      gallery.appendChild(card);
    });
}

let currentIndex = 0;

function openModal(index){
  currentIndex = index;
  modal.style.display = "flex";
  modalImg.src = images[index];
}

function closeModal(){
  modal.style.display = "none";
}

/* 📱 Swipe */
let startX = 0;

modal.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

modal.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});

function next(){
  currentIndex = (currentIndex + 1) % images.length;
  modalImg.src = images[currentIndex];
}

function prev(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  modalImg.src = images[currentIndex];
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();
</script>

</body>
</html>
