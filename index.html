<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS Icon Gallery</title>

<style>
:root {
  --bg: #1a1410;
  --text: #f5efe6;
  --card: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
}

/* Light Mode */
.light {
  --bg: #f5f1ea;
  --text: #1a1410;
  --card: rgba(255,255,255,0.6);
  --glass-border: rgba(0,0,0,0.1);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

/* Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at 20% 30%, rgba(120,70,30,0.35), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(90,50,20,0.35), transparent 40%),
    linear-gradient(135deg, #1a1410, #2a1d14, #3a2618);
}

/* Texture */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: url("https://www.transparenttextures.com/patterns/canvas.png");
  opacity: 0.12;
}

/* Header */
header {
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-size: 2.4rem;
  margin: 0;
}

p {
  opacity: 0.75;
}

/* Controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 20px;
}

button {
  border: 1px solid var(--glass-border);
  padding: 10px 16px;
  border-radius: 999px;
  background: var(--card);
  backdrop-filter: blur(12px);
  color: var(--text);
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: translateY(-2px) scale(1.05);
}

/* Grid */
.grid {
  column-count: 3;
  column-gap: 16px;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

@media (max-width: 900px) {
  .grid { column-count: 2; }
}

@media (max-width: 600px) {
  .grid { column-count: 1; }
  h1 { font-size: 2rem; }
}

/* Card */
.card {
  break-inside: avoid;
  margin-bottom: 18px;
  padding: 12px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.05)
  );

  border: 1px solid var(--glass-border);

  backdrop-filter: blur(20px) saturate(160%);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25);
}

/* Gloss effect */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.35),
    transparent 60%
  );
  opacity: 0.5;
}

.card:hover {
  transform: translateY(-6px) scale(1.03);
}

/* Image */
img {
  width: 100%;
  border-radius: 12px;
  display: block;
}

/* Download */
.download {
  position: absolute;
  bottom: 10px;
  right: 10px;

  width: 32px;
  height: 32px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.75);
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(10,6,3,0.95);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.modal img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 12px;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

/* Footer */
footer {
  text-align: center;
  padding: 40px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>🎨 MacOS Icon Gallery</h1>
  <p>Renaissance × Baroque Folder Icons</p>

  <div class="controls">
    <button onclick="render('all')">All</button>
    <button onclick="render('warm')">🔥 Warm</button>
    <button onclick="render('cool')">❄️ Cool</button>
    <button onclick="toggleTheme()">🎭 Theme</button>
  </div>
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal">
  <span class="close-btn" onclick="closeModal()">✕</span>
  <img id="modalImg">
</div>

<footer>
  Crafted with classical aesthetics ✨
</footer>

<script>
const images = [
  "Folder BGs/ART.png",
  "Folder BGs/Baroque 14.png",
  "Folder BGs/Baroque_sierrabrown.png",
  "Folder BGs/Baroque-Photoroom.png",
  "Folder BGs/Baroque10.png",
  "Folder BGs/Baroque11.png",
  "Folder BGs/Baroque12.png",
  "Folder BGs/Baroque13.png",
  "Folder BGs/Baroque15.png",
  "Folder BGs/Baroque2_ copy.png",
  "Folder BGs/Baroque2_.png",
  "Folder BGs/Baroque3.png",
  "Folder BGs/Baroque4.png",
  "Folder BGs/Baroque5.png",
  "Folder BGs/Baroque6.png",
  "Folder BGs/Baroque7.png",
  "Folder BGs/Baroque8.png",
  "Folder BGs/Renaissance_Orange.png",
  "Folder BGs/Renaissance_pink.png",
  "Folder BGs/Renaissance_Purple.png",
  "Folder BGs/Renaissance_Red.png",
  "Folder BGs/Renaissane_Yellow.png"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

function detectTone(name) {
  const warm = ["red","orange","brown","yellow"];
  return warm.some(w => name.toLowerCase().includes(w)) ? "warm" : "cool";
}

function render(filter="all"){
  gallery.innerHTML = "";

  images
    .filter(src => filter==="all" || detectTone(src)===filter)
    .forEach((src, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${src}" onclick="openModal(${index})">
        <a class="download" href="${src}" download>⬇</a>
      `;

      gallery.appendChild(card);
    });
}

let currentIndex = 0;

function openModal(index){
  currentIndex = index;
  modal.style.display = "flex";
  modalImg.src = images[index];
}

function closeModal(){
  modal.style.display = "none";
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();
</script>

</body>
</html>
