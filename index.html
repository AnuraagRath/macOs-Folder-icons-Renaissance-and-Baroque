<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS Icon Gallery</title>

<style>
:root {
  --bg: #1a1410;
  --text: #f5efe6;
  --card: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.08);
}

/* 🌞 Light Mode */
.light {
  --bg: #f5f1ea;
  --text: #1a1410;
  --card: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(0, 0, 0, 0.08);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  background: var(--bg);
  transition: 0.3s;
  overflow-x: hidden;
}

/* 🎨 Sierra Brown Artistic Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;

  background:
    radial-gradient(circle at 20% 30%, rgba(120, 70, 30, 0.35), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(90, 50, 20, 0.35), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(40, 25, 10, 0.7), transparent 70%),
    linear-gradient(135deg, #1a1410, #2a1d14, #3a2618);
}

/* 🖌️ Canvas Texture Overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: url("https://www.transparenttextures.com/patterns/canvas.png");
  opacity: 0.15;
  mix-blend-mode: overlay;
}

header {
  text-align: center;
  padding: 50px 20px;
}

h1 {
  font-size: 2.6rem;
  margin: 0;
  letter-spacing: 0.5px;
}

p {
  opacity: 0.75;
}

/* 🎛️ Controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 25px;
  flex-wrap: wrap;
}

button {
  border: 1px solid var(--glass-border);
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  background: var(--card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  transition: 0.25s ease;
}

button:hover {
  transform: translateY(-2px) scale(1.05);
  background: rgba(255,255,255,0.12);
}

/* 🧱 Masonry Layout */
.grid {
  column-count: 4;
  column-gap: 18px;
  max-width: 1200px;
  margin: auto;
  padding: 30px 20px;
}

@media (max-width: 900px) {
  .grid { column-count: 2; }
}

.card {
  break-inside: avoid;
  margin-bottom: 18px;
  padding: 10px;
  border-radius: 20px;
  position: relative;
  overflow: hidden;

  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.04)
  );

  border: 1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25),
    inset 0 -2px 6px rgba(0,0,0,0.3);

  transition: all 0.35s ease;
}

/* ✨ Gloss highlight layer */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.35) 0%,
    rgba(255,255,255,0.08) 30%,
    transparent 60%
  );

  opacity: 0.6;
  pointer-events: none;
}

/* 🌟 Hover = more "liquid" feel */
.card:hover {
  transform: translateY(-8px) scale(1.04);

  box-shadow:
    0 25px 60px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.35),
    inset 0 -3px 8px rgba(0,0,0,0.4);
}

  
/* 🖼️ Images */
img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
  display: block;
}

/* ⬇️ Download Button */
.download {
  position: absolute;
  bottom: 12px;
  right: 12px;
  font-size: 12px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  color: white;
  padding: 5px 9px;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.2s;
}

.download:hover {
  background: black;
}

/* 🔍 Modal */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(10, 6, 3, 0.95);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 14px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.8);
}

/* 🦶 Footer */
footer {
  text-align: center;
  padding: 50px;
  opacity: 0.6;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<header>
  <h1>🎨 MacOS Icon Gallery</h1>
  <p>Renaissance × Baroque Folder Icons</p>

  <div class="controls">
    <button onclick="render('all')">All</button>
    <button onclick="render('warm')">🔥 Warm</button>
    <button onclick="render('cool')">❄️ Cool</button>
    <button onclick="toggleTheme()">🎭 Toggle Theme</button>
  </div>
</header>

<div class="grid" id="gallery"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<footer>
  Crafted with classical aesthetics ✨
</footer>

<script>
const images = [
  "Folder BGs/ART.png",
  "Folder BGs/Baroque 14.png",
  "Folder BGs/Baroque_sierrabrown.png",
  "Folder BGs/Baroque-Photoroom.png",
  "Folder BGs/Baroque10.png",
  "Folder BGs/Baroque11.png",
  "Folder BGs/Baroque12.png",
  "Folder BGs/Baroque13.png",
  "Folder BGs/Baroque15.png",
  "Folder BGs/Baroque2_ copy.png",
  "Folder BGs/Baroque2_.png",
  "Folder BGs/Baroque3.png",
  "Folder BGs/Baroque4.png",
  "Folder BGs/Baroque5.png",
  "Folder BGs/Baroque6.png",
  "Folder BGs/Baroque7.png",
  "Folder BGs/Baroque8.png",
  "Folder BGs/Renaissance_Orange.png",
  "Folder BGs/Renaissance_pink.png",
  "Folder BGs/Renaissance_Purple.png",
  "Folder BGs/Renaissance_Red.png",
  "Folder BGs/Renaissane_Yellow.png"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

function detectTone(name) {
  const warm = ["red","orange","brown","yellow"];
  return warm.some(w => name.toLowerCase().includes(w)) ? "warm" : "cool";
}

function render(filter="all"){
  gallery.innerHTML = "";

  images
    .filter(src => filter==="all" || detectTone(src)===filter)
    .forEach((src, index) => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${src}" onclick="openModal(${index})">
        <a class="download" href="${src}" download>⬇</a>
      `;

      gallery.appendChild(card);
    });
}

let currentIndex = 0;

function openModal(index){
  currentIndex = index;
  modal.style.display = "flex";
  modalImg.src = images[index];
}

function closeModal(){
  modal.style.display = "none";
}

/* 📱 Swipe */
let startX = 0;

modal.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

modal.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});

function next(){
  currentIndex = (currentIndex + 1) % images.length;
  modalImg.src = images[currentIndex];
}

function prev(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  modalImg.src = images[currentIndex];
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();
</script>

</body>
</html>
